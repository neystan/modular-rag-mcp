app:
  name: modular-rag-mcp
  environment: local

llm:
  provider: qwen
  model: qwen3.5-flash
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: sk-5d87f40486954f53bed85f3383eb95d0
  timeout: 90

vision_llm:
  provider: qwen
  model: qwen3.5-plus
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: sk-5d87f40486954f53bed85f3383eb95d0
  timeout: 30

embedding:
  provider: qwen
  model: text-embedding-v4
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: sk-5d87f40486954f53bed85f3383eb95d0
  timeout: 30
  dimensions: 1024

splitter:
  provider: recursive
  chunk_size: 1000
  chunk_overlap: 200

vector_store:
  provider: chroma
  collection: default
  persist_path: data/db/chroma

retrieval:
  top_k: 5
  mode: hybrid

rerank:
  provider: none
  top_k: 5

evaluation:
  provider: custom
  enabled: false

observability:
  log_level: INFO
  log_file: logs/app.log

ingestion:
  chunk_refiner:
    use_llm: true
  metadata_enricher:
    use_llm: true
  image_captioner:
    use_vision_llm: false
