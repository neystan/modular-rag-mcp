app:
  name: modular-rag-mcp
  environment: local

llm:
  provider: qwen
  model: kimi-k2.5
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: sk-5d87f40486954f53bed85f3383eb95d0
  timeout: 90

vision_llm:
  provider: qwen
  model: kimi-k2.5
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: sk-5d87f40486954f53bed85f3383eb95d0
  timeout: 30

embedding:
  provider: qwen
  model: text-embedding-v4
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: sk-5d87f40486954f53bed85f3383eb95d0
  timeout: 30
  dimensions: 1024

splitter:
  provider: recursive
  chunk_size: 500
  chunk_overlap: 100

vector_store:
  provider: chroma
  collection: default
  persist_path: data/db/chroma

retrieval:
  top_k: 3
  mode: hybrid

rerank:
  provider: qwen
  model: qwen3-rerank
  base_url: https://dashscope.aliyuncs.com/compatible-api/v1
  api_key: sk-5d87f40486954f53bed85f3383eb95d0
  top_k: 2

evaluation:
  provider: ragas
  enabled: true

observability:
  log_level: INFO
  log_file: logs/app.log

ingestion:
  chunk_refiner:
    use_llm: true
  metadata_enricher:
    use_llm: false
  image_captioner:
    use_vision_llm: true
